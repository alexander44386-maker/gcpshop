name: Sync Facebook Posts

# When this runs:
# - Every hour, automatically (edit the cron schedule below to change frequency)
# - Any time you trigger it manually from the Actions tab ("Run workflow" button)
on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch: {}    # lets you trigger it manually from GitHub's UI

# Needed so the workflow is allowed to push commits back to the repo
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out your repo so the workflow can read/write files in it
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Set up Python to run the build script
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Fetch the latest posts from the Graph API
      - name: Fetch posts from Facebook
        env:
          FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          curl -sf "https://graph.facebook.com/v25.0/${FB_PAGE_ID}/feed?access_token=${FB_TOKEN}&fields=id,message,created_time,full_picture,permalink_url&limit=10" \
            -o posts.json
          echo "Fetched posts:"
          cat posts.json

      # 4. Convert the raw JSON into an HTML snippet for the site
      - name: Build HTML snippet
        run: python scripts/build_html.py

      # 5. Commit and push the updated file, but only if something actually changed
      - name: Commit updated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fb-posts.html
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Facebook posts [automated]"
            git push
          fi
