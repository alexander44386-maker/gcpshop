name: Sync Facebook Posts

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour (UTC)
  workflow_dispatch: {}    # lets you trigger it manually from GitHub's UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch posts from Facebook
        env:
          FB_TOKEN: ${{ secrets.FB_PAGE_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          curl -s -o posts.json -w "HTTP status: %{http_code}\n" \
            "https://graph.facebook.com/v25.0/${FB_PAGE_ID}/feed?access_token=${FB_TOKEN}&fields=id,message,created_time,full_picture,permalink_url&limit=10"
          echo "Response body:"
          cat posts.json

      - name: Sync new products to Firebase
        run: python scripts/sync_products.py

      - name: Commit updated posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add synced_posts.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Facebook posts [automated]"
            git push
          fi
