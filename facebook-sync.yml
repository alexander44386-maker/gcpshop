name: Sync Facebook Posts to Products

on:
  schedule:
    # Runs every 30 minutes. Adjust the cron expression if you want a
    # different frequency (this uses UTC time).
    - cron: "*/30 * * * *"
  workflow_dispatch: {}
    # Lets you trigger it manually from the Actions tab in GitHub, useful
    # for testing right after you post something.

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Facebook sync script
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
          FIREBASE_DB_URL: ${{ secrets.FIREBASE_DB_URL }}
        run: node scripts/sync-facebook-posts.js

      - name: Commit updated processed-posts log
        run: |
          git config user.name "facebook-sync-bot"
          git config user.email "actions@github.com"
          git add data/processed_posts.json
          git diff --staged --quiet || git commit -m "Update processed Facebook posts log"
          git push
